# Bump version and push tag; triggers release.yml (GoReleaser).
# Run manually from Actions tab: Run workflow -> choose bump type.
name: Bump version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install svu
        run: go install github.com/caarlos0/svu/v3@latest

      - name: Get next version
        id: next
        run: |
          next=$(svu ${{ github.event.inputs.bump }})
          echo "version=$next" >> $GITHUB_OUTPUT
          echo "Next version: $next"

      - name: Create and push tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next.outputs.version }}"
          git push origin "${{ steps.next.outputs.version }}"
