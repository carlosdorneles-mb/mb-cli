command: do
description: Ações por flag (deploy, rollback) — exemplo sem entrypoint único
flags:
  - name: deploy
    description: Descrição da flag deploy
    entrypoint: deploy.sh
    commands:
      long: deploy
      short: d
  - name: rollback
    description: Descrição da flag rollback
    entrypoint: rollback.sh
    commands:
      long: rollback
