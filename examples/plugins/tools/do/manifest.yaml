command: do
description: Ações por flag (deploy, rollback) — exemplo sem entrypoint único
flags:
  - name: deploy
    description: Deploy
    entrypoint: deploy.sh
    commands:
      long: deploy
      short: d
  - name: rollback
    description: Revert
    entrypoint: rollback.sh
    commands:
      long: rollback
      short: r
