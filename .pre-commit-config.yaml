repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [ commit-msg ]
        args: [
          "build",
          "chore",
          "ci",
          "docs",
          "feat",
          "fix",
          "perf",
          "style",
          "refactor",
          "test",
          "bump",
          "revert",
          "security",
        ]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(?!.*\.go$).*'
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ['--branch', 'main']
        stages: [ pre-push ]
        exclude: '^(?!.*\.go$).*'

  - repo: local
    hooks:
      - id: golangci-lint
        name: Run GolangCI-Lint
        entry: make lint
        language: system
        types: [go]
        pass_filenames: false

      - id: go-unit-tests
        name: Run Go Unit Tests
        entry: go
        args: ['test', '-short', './...']
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-push]
